name: Deploy ke VPS (build di VPS — fallback manual)

# Alur utama memakai "Build image (GHCR) & deploy" (build-image.yml) yang otomatis
# saat push ke main. Workflow ini adalah ALTERNATIF: build langsung di VPS, hanya
# dipicu manual. Berguna bila GHCR tidak dipakai.
on:
  workflow_dispatch: {}

# Cegah dua deploy berjalan bersamaan
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (git pull + docker compose)
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_KEY:-}" ] || [ -z "${VPS_HOST:-}" ] || [ -z "${VPS_USER:-}" ]; then
            echo "::notice::Secret VPS_SSH_KEY / VPS_HOST / VPS_USER belum diatur — deploy dilewati. Lihat deploy/README.md bagian 4."
            exit 0
          fi
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/opt/sikeu-tazkia}"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "→ Deploy ke $VPS_USER@$VPS_HOST:$PORT ($APP_DIR)"
          ssh -i ~/.ssh/id_deploy -p "$PORT" "$VPS_USER@$VPS_HOST" \
            "set -e; cd '$APP_DIR'; git fetch --all --prune; git reset --hard origin/main; bash deploy/deploy.sh"
