# Deployment produksi SIKEU Tazkia: app + PostgreSQL + Caddy (auto-HTTPS).
# Konfigurasi rahasia dibaca dari berkas .env (lihat .env.production.example).
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sikeu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD wajib diisi di .env}
      POSTGRES_DB: ${POSTGRES_DB:-sikeu}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sikeu} -d ${POSTGRES_DB:-sikeu}"]
      interval: 10s
      timeout: 5s
      retries: 6

  app:
    # Default: tarik image pra-bangun dari GHCR (alur CI). `build: .` tetap ada sebagai
    # fallback agar bisa juga build langsung di VPS bila diperlukan.
    image: ${APP_IMAGE:-ghcr.io/galihsidik86/sikeu-tazkia:latest}
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-sikeu}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sikeu}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET wajib diisi di .env}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - appdata:/app/data      # backup database otomatis tersimpan di sini
    # Terbitkan ke loopback host agar reverse proxy yang sudah ada (mis. Caddy/Nginx
    # milik server) dapat memproksikan domain ke sini. APP_PORT diatur di .env.
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"

  # Caddy bawaan — HANYA untuk server berdiri sendiri (belum punya reverse proxy).
  # Aktifkan dengan:  docker compose --profile proxy up -d
  # Bila server sudah punya Caddy/Nginx sendiri, JANGAN aktifkan (biarkan profil off)
  # dan tambahkan vhost di proxy tersebut menuju 127.0.0.1:${APP_PORT}.
  caddy:
    image: caddy:2-alpine
    profiles: ["proxy"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN wajib diisi di .env}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  appdata:
  caddy_data:
  caddy_config:
